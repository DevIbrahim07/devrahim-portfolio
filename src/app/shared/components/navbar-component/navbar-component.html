<nav #navbar class="navbar-wrapper">
  <div class="navbar-inner" [class.scrolled]="isScrolled()">
    <!-- Logo -->
    <div class="navbar-logo" (click)="scrollTo('#hero')">
      <div class="logo-image-wrapper">
        <img [src]="profileImage" alt="Ibrahim" class="logo-img" />
      </div>
      <span class="logo-text">Ibrahim<span class="logo-dot">.</span>dev</span>
    </div>

    <!-- Desktop Links -->
    <ul class="navbar-links">
      @for (link of navLinks; track link.label) {
        <li>
          <a class="nav-link" (click)="scrollTo(link.href)">
            {{ link.label }}
          </a>
        </li>
      }
    </ul>

    <!-- Desktop Right Actions -->
    <div class="navbar-actions">
      <!-- Theme Toggle — desktop -->
      <button class="theme-toggle" (click)="theme.toggle()" aria-label="Toggle theme">
        @if (theme.isDark()) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 000 14A7 7 0 0012 5z"
            />
          </svg>
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"
            />
          </svg>
        }
      </button>
      <!-- Tour Button — desktop -->
      <!-- <button class="tour-btn" (click)="startTour()" aria-label="Start tour" title="Take a tour">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278
         2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0
         11-18 0 9 9 0 0118 0z"
          />
        </svg>
      </button> -->
      <!-- Contact Button -->
      <!-- <a class="contact-btn" (click)="scrollTo('#contact')">Contact</a> -->
      <!-- Resume Button -->
      <a
        class="contact-btn"
        href="https://drive.google.com/file/d/1F2m5xq9Ua69yQvpq9cbuxtWCbMMqJLHC/view?usp=sharing"
        target="_blank"
        rel="noopener noreferrer"
      >
        Resume
      </a>
    </div>

    <!-- Mobile Right (theme toggle + hamburger) -->
    <div class="mobile-right">
      <!-- Tour Button — mobile -->
      <!-- <button class="tour-btn" (click)="startTour()" aria-label="Start tour">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278
         2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0
         11-18 0 9 9 0 0118 0z"
          />
        </svg>
      </button> -->
      <!-- Theme Toggle — mobile -->
      <button class="theme-toggle" (click)="theme.toggle()" aria-label="Toggle theme">
        @if (theme.isDark()) {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M17.657 17.657l-.707-.707M6.343 6.343l-.707-.707M12 5a7 7 0 000 14A7 7 0 0012 5z"
            />
          </svg>
        } @else {
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"
            />
          </svg>
        }
      </button>

      <!-- Hamburger -->
      <button class="hamburger" (click)="isMobileOpen.set(!isMobileOpen())">
        <span [class.open-1]="isMobileOpen()"></span>
        <span [class.open-2]="isMobileOpen()"></span>
        <span [class.open-3]="isMobileOpen()"></span>
      </button>
    </div>
  </div>

  <!-- Mobile Menu -->
  @if (isMobileOpen()) {
    <div class="mobile-menu">
      @for (link of navLinks; track link.label) {
        <a class="mobile-link" (click)="scrollTo(link.href)">
          {{ link.label }}
        </a>
      }
      <!-- <a class="contact-btn mobile-contact" (click)="scrollTo('#contact')"> Contact </a> -->
      <a
        class="contact-btn mobile-contact"
        href="https://drive.google.com/file/d/1F2m5xq9Ua69yQvpq9cbuxtWCbMMqJLHC/view?usp=sharing"
        target="_blank"
        rel="noopener noreferrer"
      >
        Resume
      </a>
    </div>
  }
</nav>
